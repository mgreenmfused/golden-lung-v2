<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Golden Lungs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1B3A5C;
  --blue: #2E75B6;
  --light: #E8F0F8;
  --green: #27AE60;
  --red: #C0392B;
  --gold: #D4A017;
  --yellow: #F1C40F;
  --white: #ffffff;
  --text: #1a2a3a;
  --muted: #6b7a8d;
  --border: #d0dbe8;
  --bg: #f0f4f8;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; }
#app-wrapper { width: 100%; max-width: 480px; min-height: 100vh; background: var(--white); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.08); }

/* HEADER */
#gl-header { background: var(--navy); color: white; padding: 12px 16px 10px; position: sticky; top: 0; z-index: 100; }
#header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
#app-title { font-size: 17px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
#ctx-bar { font-size: 11px; opacity: 0.75; letter-spacing: 0.3px; }
#prog-wrap { height: 3px; background: rgba(255,255,255,0.18); border-radius: 2px; margin-top: 8px; }
#prog-bar { height: 100%; background: var(--yellow); border-radius: 2px; transition: width 0.4s ease; }

/* RESUME BAR */
#resume-bar { background: var(--gold); color: var(--navy); padding: 11px 16px; display: none; align-items: center; justify-content: space-between; gap: 10px; }
#resume-bar span { font-size: 13px; font-weight: 600; }
.btn-xs { padding: 7px 13px; border-radius: 8px; border: none; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; }

/* CONTENT */
#content { flex: 1; padding: 20px 16px 110px; overflow-y: auto; }

/* BOTTOM NAV */
#bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: var(--white); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 10px; z-index: 100; }

/* BUTTONS */
.btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform 0.12s, opacity 0.12s; line-height: 1.2; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--navy); color: white; }
.btn-back { background: var(--light); color: var(--navy); flex: 0.55; }
.btn-green { background: var(--green); color: white; }
.btn-red { background: var(--red); color: white; }
.btn-gold { background: var(--gold); color: var(--navy); }
.btn-full { width: 100%; display: block; }
.btn-disabled { background: #d0d8e0; color: #9aacbd; cursor: not-allowed; }

/* TYPOGRAPHY */
.screen-title { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
.screen-sub { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }

/* CARDS */
.card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; color: var(--muted); margin-bottom: 11px; }

/* PILLS */
.pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
.pill { padding: 10px 15px; border-radius: 100px; border: 2px solid var(--border); background: white; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--navy); cursor: pointer; transition: all 0.13s; user-select: none; }
.pill:active { transform: scale(0.95); }
.pill.sel { background: var(--navy); border-color: var(--navy); color: white; }
.pill.sel-green { background: var(--green); border-color: var(--green); color: white; }
.pill.sel-red { background: var(--red); border-color: var(--red); color: white; }
.pill.sel-blue { background: var(--blue); border-color: var(--blue); color: white; }

/* FORM */
.field-wrap { margin-bottom: 14px; }
.field-label { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; display: block; }
.req { color: var(--red); margin-left: 2px; }
.text-in, textarea { width: 100%; padding: 12px 13px; border: 2px solid var(--border); border-radius: 11px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); outline: none; transition: border-color 0.15s; background: white; }
.text-in:focus, textarea:focus { border-color: var(--blue); }
textarea { resize: none; min-height: 78px; }

/* BADGES */
.mode-badge { display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
.badge-lv1 { background: var(--light); color: var(--navy); }
.badge-lv2 { background: #fef9e7; color: #8a5f00; }
.badge-ko { background: #fde8e8; color: var(--red); }

/* INFO BOXES */
.infobox { border-radius: 12px; padding: 13px 15px; margin-bottom: 12px; }
.infobox-blue { background: var(--light); border-left: 4px solid var(--blue); }
.infobox-gold { background: #fef9e7; border-left: 4px solid var(--gold); }
.infobox-green { background: #eafaf1; border-left: 4px solid var(--green); }
.infobox-red { background: #fde8e8; border-left: 4px solid var(--red); }
.infobox strong { font-size: 13px; display: block; margin-bottom: 4px; }
.infobox p, .infobox li { font-size: 13px; color: var(--muted); line-height: 1.6; }

/* TIMER */
.timer-wrap { display: flex; flex-direction: column; align-items: center; margin: 16px 0; }
.timer-ring { width: 140px; height: 140px; border-radius: 50%; border: 6px solid var(--light); display: flex; align-items: center; justify-content: center; font-size: 52px; font-weight: 700; color: var(--navy); transition: border-color 0.3s; }
.timer-ring.running { border-color: var(--blue); animation: ring-pulse 1s ease-in-out infinite; }
.timer-ring.done { border-color: var(--green); }
@keyframes ring-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
.timer-label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; height: 20px; }
.phase-early { color: var(--green); }
.phase-mid { color: var(--blue); }
.phase-late { color: #e67e22; }
.timer-hint { font-size: 13px; color: var(--muted); margin-top: 8px; }

/* DONE */
.done-check { width: 76px; height: 76px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 34px; color: white; }

/* DEFECTS */
.defect-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.defect-chip { padding: 10px 10px; border: 2px solid var(--border); border-radius: 10px; font-size: 13px; font-weight: 500; text-align: center; cursor: pointer; transition: all 0.13s; user-select: none; }
.defect-chip.on { background: #fde8e8; border-color: var(--red); color: var(--red); }

/* TOAST */
#toast { position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%); background: var(--navy); color: white; padding: 9px 18px; border-radius: 100px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.25s; z-index: 300; white-space: nowrap; pointer-events: none; }
#toast.show { opacity: 1; }

/* SPLASH */
.day-btn-wrap { display: flex; flex-direction: column; gap: 10px; }
.day-sel-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; text-align: left; transition: transform 0.12s; }
.day-sel-btn:active { transform: scale(0.98); }
.day-sel-btn .day-num { font-size: 17px; font-weight: 700; color: white; }
.day-sel-btn .day-desc { font-size: 12px; color: rgba(255,255,255,0.82); margin-top: 3px; font-weight: 400; }
</style>
</head>
<body>
<div id="app-wrapper">
  <div id="gl-header">
    <div id="header-top">
      <div id="app-title">🫁 Golden Lungs</div>
      <div id="ctx-bar"></div>
    </div>
    <div id="prog-wrap"><div id="prog-bar" style="width:0%"></div></div>
  </div>
  <div id="resume-bar">
    <span>📋 Session in progress</span>
    <div style="display:flex;gap:8px">
      <button class="btn-xs" style="background:white;color:var(--navy)" onclick="resumeSession()">Resume</button>
      <button class="btn-xs" style="background:rgba(0,0,0,0.12);color:var(--navy)" onclick="clearAndSplash()">Start Over</button>
    </div>
  </div>
  <div id="content"></div>
  <div id="bottom-nav"></div>
</div>
<div id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
var SHEETS_URL = "https://script.google.com/macros/s/AKfycbyS8TjEAzT71mbPzJdaWhMx1i6dV5Ggaqc6_LWBM0M9whY7G-Kc7AvK_Jx3CZUWrB3s/exec";

// ─── STATE ────────────────────────────────────────────────────────────────────
var S = {
  day: null,
  idx: 0,
  name: '',
  evalId: '',
  code: '',
  oil: null,
  d: {}  // all collected data
};

// ─── PILL OPTION SETS ─────────────────────────────────────────────────────────
var OPT = {
  cloud:    ['Small','Medium','Large','Huge'],
  pull:     ['Too Airy','Just Right','Slightly Tight','Too Tight'],
  flavor:   ['Poor','OK','Good','Excellent'],
  overall:  ['Poor','OK','Good','Excellent'],
  effect:   ['Not Really','Mild','Moderate','Strong'],
  v1comp:   ['Much Better','Better','About the Same','Worse','Much Worse',"Haven't Used V1"],
  v1effect: ['Much Higher','Higher','About the Same','Less','Much Less',"Can't Compare"],
  purchase: ['Definitely','Probably','Maybe','Probably Not','Definitely Not'],
  yesno:    ['Yes','No']
};

var DEFECTS = ['Burnt taste','Metallic taste','Chemical/solvent','Spit-back','Coughing','Hot mouthpiece','Gurgling','Weak/no vapor','Blocked draw','Leaking'];

// ─── SCREEN LISTS ─────────────────────────────────────────────────────────────
var SCREENS = {
  1: [
    'info','warmup',
    'lv1_intro','lv1_sip','lv1_score','lv1_wait','lv1_effect',
    'lv2_intro','lv2_sip','lv2_score','lv2_wait','lv2_effect',
    'v1_compare','done'
  ],
  2: [
    'info',
    'lv1_intro','lv1_draw','lv1_score','lv1_wait','lv1_effect',
    'lv2_intro','lv2_draw','lv2_score','lv2_wait','lv2_effect',
    'v1_compare','done'
  ],
  3: [
    'info',
    'ko_intro','ko_draw','ko_score','ko_wait','ko_effect',
    'feedback','done'
  ]
};

// ─── ACTIVE TIMER ─────────────────────────────────────────────────────────────
var _timer = null;
function killTimer() { if (_timer) { clearInterval(_timer); _timer = null; } }

// ─── RENDER ENTRY ─────────────────────────────────────────────────────────────
function render() {
  killTimer();
  var screens = SCREENS[S.day] || [];
  var sid = screens[S.idx];
  if (!sid) return;

  var pct = Math.round((S.idx / Math.max(screens.length - 1, 1)) * 100);
  document.getElementById('prog-bar').style.width = pct + '%';

  var parts = [];
  if (S.code) parts.push(S.code);
  if (S.oil) parts.push(S.oil);
  if (S.day) parts.push('Day ' + S.day);
  document.getElementById('ctx-bar').textContent = parts.join(' · ');

  document.getElementById('content').innerHTML = renderScreen(sid);
  renderNav(sid);
  if (sid === 'done') setTimeout(submitData, 600);
  window.scrollTo(0, 0);
  save();
}

// ─── SCREEN ROUTER ────────────────────────────────────────────────────────────
function renderScreen(sid) {
  if (sid === 'info')        return scrInfo();
  if (sid === 'warmup')      return scrWarmup();
  if (sid === 'lv1_intro')   return scrModeIntro('LV1');
  if (sid === 'lv2_intro')   return scrModeIntro('LV2');
  if (sid === 'ko_intro')    return scrModeIntro('KO');
  if (sid === 'lv1_sip')     return scrSipDraw('LV1');
  if (sid === 'lv2_sip')     return scrSipDraw('LV2');
  if (sid === 'lv1_draw')    return scrTimedDraw('LV1', 7);
  if (sid === 'lv2_draw')    return scrTimedDraw('LV2', 7);
  if (sid === 'ko_draw')     return scrKoDraw();
  if (sid === 'lv1_score')   return scrScore('LV1');
  if (sid === 'lv2_score')   return scrScore('LV2');
  if (sid === 'ko_score')    return scrScore('KO');
  if (sid === 'lv1_wait')    return scrWait('LV1');
  if (sid === 'lv2_wait')    return scrWait('LV2');
  if (sid === 'ko_wait')     return scrWait('KO');
  if (sid === 'lv1_effect')  return scrEffect('LV1', false);
  if (sid === 'lv2_effect')  return scrEffect('LV2', false);
  if (sid === 'ko_effect')   return scrEffect('KO', true);
  if (sid === 'v1_compare')  return scrV1Compare();
  if (sid === 'feedback')    return scrFeedback();
  if (sid === 'done')        return scrDone();
  return '<p style="padding:20px">Unknown screen: ' + sid + '</p>';
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function renderNav(sid) {
  var isFirst = S.idx === 0;
  var isDone = sid === 'done';
  var html = '';
  if (!isDone) {
    if (!isFirst) html += '<button class="btn btn-back" onclick="goBack()">← Back</button>';
    html += '<button class="btn btn-primary" id="btn-next" onclick="goNext()">Continue →</button>';
  }
  document.getElementById('bottom-nav').innerHTML = html;
}

function goNext() {
  var sid = SCREENS[S.day][S.idx];
  if (!validate(sid)) return;
  var screens = SCREENS[S.day];
  if (S.idx < screens.length - 1) { S.idx++; render(); }
}

function goBack() {
  if (S.idx > 0) { S.idx--; render(); }
}

// ─── VALIDATION ───────────────────────────────────────────────────────────────
function validate(sid) {
  if (sid === 'info') {
    if (!S.name.trim())  { toast('Please enter your name'); return false; }
    if (!S.code.trim())  { toast('Please enter device code'); return false; }
    if (!S.oil)          { toast('Please select oil line'); return false; }
  }
  if (sid === 'lv1_sip' && !S.d.lv1_sip_done)  { toast('Tap Done after your sips'); return false; }
  if (sid === 'lv2_sip' && !S.d.lv2_sip_done)  { toast('Tap Done after your sips'); return false; }
  if (sid === 'lv1_draw' && !S.d.lv1_draw_done) { toast('Complete the draw first'); return false; }
  if (sid === 'lv2_draw' && !S.d.lv2_draw_done) { toast('Complete the draw first'); return false; }
  if (sid === 'ko_draw' && !S.d.ko_draw_done)   { toast('Complete the KO draw first'); return false; }
  if ((sid === 'lv1_wait' || sid === 'lv2_wait' || sid === 'ko_wait') && !S.d[sid + '_ready']) {
    toast("Tap \"I'm Ready\" when set"); return false;
  }
  return true;
}

// ─── PILL HELPER ─────────────────────────────────────────────────────────────
function pg(groupId, dataKey, opts, selClass) {
  selClass = selClass || 'sel';
  var cur = S.d[dataKey];
  return '<div class="pill-group" id="pg-' + groupId + '">' +
    opts.map(function(o) {
      var esc = o.replace(/'/g,"&#39;");
      return '<button class="pill ' + (cur === o ? selClass : '') + '" data-v="' + esc + '" onclick="pick(\'' + groupId + '\',\'' + dataKey + '\',this)">' + o + '</button>';
    }).join('') + '</div>';
}

function pick(groupId, dataKey, btn) {
  var val = btn.getAttribute('data-v');
  S.d[dataKey] = val;
  save();
  var group = document.getElementById('pg-' + groupId);
  if (group) {
    group.querySelectorAll('.pill').forEach(function(p) {
      p.classList.remove('sel','sel-green','sel-blue','sel-red');
    });
    btn.classList.add('sel');
  }
}

// ─── SCREENS ─────────────────────────────────────────────────────────────────

function scrInfo() {
  var dayDescs = {
    1: '🔵 Sip draws on LV1 + LV2, then use the device normally overnight',
    2: '🟡 Longer 7-second draws on LV1 + LV2',
    3: '🔴 KO Mode draw + final feedback'
  };
  return `
    <div class="screen-title">Session Info</div>
    <div class="screen-sub">Fill in your details before we start.</div>
    <div class="field-wrap">
      <label class="field-label">Your Name <span class="req">*</span></label>
      <input class="text-in" type="text" value="${esc(S.name)}" placeholder="First Last" oninput="S.name=this.value;save()">
    </div>
    <div class="field-wrap">
      <label class="field-label">Device Code <span class="req">*</span></label>
      <input class="text-in" type="text" value="${esc(S.code)}" placeholder="e.g. A1" oninput="S.code=this.value;save()">
    </div>
    <div class="field-wrap">
      <label class="field-label">Oil Line <span class="req">*</span></label>
      <div class="pill-group">
        ${['Loud','Twisted','Fire','LIVE'].map(function(o){ return '<button class="pill ' + (S.oil===o?'sel':'') + '" onclick="S.oil=\''+o+'\';save();document.querySelectorAll(\'#oil-pg .pill\').forEach(function(p){p.classList.remove(\'sel\')});this.classList.add(\'sel\')" id="oil-pg">' + o + '</button>'; }).join('')}
      </div>
    </div>
    <div class="field-wrap">
      <label class="field-label">Oil Level <span class="req">*</span></label>
      <div class="pill-group">
        ${['Full','~75%','~50%','~25%','Almost Empty','Last Few Puffs'].map(function(o){ return '<button class="pill ' + (S.d.oilLevel===o?'sel':'') + '" onclick="S.d.oilLevel=\''+o+'\';save();document.querySelectorAll(\'#oil-lvl-pg .pill\').forEach(function(p){p.classList.remove(\'sel\')});this.classList.add(\'sel\')" id="oil-lvl-pg">' + o + '</button>'; }).join('')}
      </div>
    </div>
    <div class="field-wrap">
      <label class="field-label">Session Day <span class="req">*</span></label>
      <div class="pill-group">
        ${[1,2,3].map(function(d){ return '<button class="pill ' + (S.day===d?'sel':'') + '" onclick="switchDay(' + d + ')">' + 'Day ' + d + '</button>'; }).join('')}
      </div>
      ${S.day ? '<div class="infobox infobox-blue" style="margin-top:10px"><p>' + dayDescs[S.day] + '</p></div>' : ''}
    </div>
  `;
}

function switchDay(d) {
  S.day = d; S.idx = 0; save(); render();
}

function scrWarmup() {
  return `
    <div class="screen-title">Warm-Up</div>
    <div class="screen-sub">Before scoring, wake the device up.</div>
    <div class="card">
      <div class="card-title">Instructions</div>
      <p style="font-size:16px;line-height:1.8;color:var(--navy)">Take <strong>2–3 casual puffs</strong> on LV1 to get the oil flowing and the coil up to temp.</p>
      <p style="font-size:13px;color:var(--muted);margin-top:10px">No scoring on these — just wake the device up.</p>
    </div>
    <div class="infobox infobox-blue">
      <strong>Make sure you're on LV1</strong>
      <p>The display should show LV1. If not, click the button once to confirm.</p>
    </div>
    <div style="text-align:center;margin-top:28px;font-size:44px">💨</div>
    <p style="text-align:center;margin-top:10px;font-size:14px;color:var(--muted)">Tap Continue when warmed up</p>
  `;
}

function scrModeIntro(mode) {
  var cfg = {
    LV1: { emoji:'🔵', badge:'badge-lv1', color:'blue', steps:'Confirm you are on <strong>LV1</strong>. The screen should show LV1 in blue.' },
    LV2: { emoji:'🟡', badge:'badge-lv2', color:'yellow', steps:'Press the button <strong>3 times</strong> to switch to LV2. The screen should turn <strong>YELLOW</strong>.' },
    KO:  { emoji:'🔴', badge:'badge-ko',  color:'red',   steps:'Press the button <strong>3 times</strong> to switch to KO Mode. The screen should turn <strong>RED</strong>.' }
  }[mode];
  return `
    <span class="mode-badge ${cfg.badge}">${mode} Mode</span>
    <div class="screen-title">Switch to ${mode}</div>
    <div class="screen-sub">Get into the right mode before your next draw.</div>
    <div class="card" style="text-align:center">
      <div style="font-size:52px;margin:10px 0 14px">${cfg.emoji}</div>
      <p style="font-size:16px;line-height:1.7;color:var(--navy)">${cfg.steps}</p>
    </div>
    ${mode==='KO'?'<div class="infobox infobox-red"><strong>KO Mode — What to Expect</strong><p>Power starts at 3.0V and steps down to 2.2V over 15 seconds. You\'ll feel the draw change as you go. Stop whenever you need to — that\'s OK.</p></div>':''}
    <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--muted)">Confirm mode is set, then continue</p>
  `;
}

function scrSipDraw(mode) {
  var key = mode.toLowerCase() + '_sip_done';
  var done = !!S.d[key];
  var badge = mode === 'LV1' ? 'badge-lv1' : 'badge-lv2';
  return `
    <span class="mode-badge ${badge}">${mode} Mode</span>
    <div class="screen-title">Sip Draws</div>
    <div class="screen-sub">Take 3–4 quick sip pulls — like hitting a joint.</div>
    <div class="card">
      <div class="card-title">How to Sip</div>
      <ul style="padding-left:18px;line-height:2.1;color:var(--navy);font-size:15px">
        <li>Sip 1 — inhale for 3–4 seconds</li>
        <li>Sip 2 — same</li>
        <li>Sip 3 — same</li>
        <li>Sip 4 — optional if you want more</li>
      </ul>
      <p style="font-size:13px;color:var(--muted);margin-top:10px">Relaxed pulls — don't hold your breath after each one.</p>
    </div>
    <button class="btn ${done?'btn-green':'btn-primary'} btn-full" id="sip-btn" onclick="markSipDone('${key}')">
      ${done ? '✓ Sips Complete — Ready to Score' : 'Done — Score My Sips'}
    </button>
    ${!done?'<p style="text-align:center;margin-top:10px;font-size:13px;color:var(--muted)">Tap after your last sip</p>':''}
  `;
}

function markSipDone(key) {
  S.d[key] = true; save();
  var btn = document.getElementById('sip-btn');
  if (btn) { btn.className = 'btn btn-green btn-full'; btn.textContent = '✓ Sips Complete — Ready to Score'; }
}

function scrTimedDraw(mode, sec) {
  var key = mode.toLowerCase() + '_draw_done';
  var done = !!S.d[key];
  var badge = mode === 'LV1' ? 'badge-lv1' : 'badge-lv2';
  return `
    <span class="mode-badge ${badge}">${mode} Mode</span>
    <div class="screen-title">${sec}-Second Draw</div>
    <div class="screen-sub">Take one steady ${sec}-second pull when you're ready.</div>
    <div class="timer-wrap">
      <div class="timer-ring ${done?'done':''}" id="t-ring"><span id="t-num">${sec}</span></div>
      <div class="timer-hint" id="t-hint">${done?'✓ Draw complete!':'Tap Start when the device is at your lips'}</div>
    </div>
    ${!done ? `<button class="btn btn-primary btn-full" id="t-start" onclick="startTimedDraw('${mode}',${sec},'${key}')">▶ Start ${sec}-Second Draw</button>` : ''}
    ${done  ? `<button class="btn btn-green btn-full" disabled>✓ Draw Complete</button>` : ''}
  `;
}

function startTimedDraw(mode, sec, key) {
  var rem = sec;
  var startBtn = document.getElementById('t-start');
  if (startBtn) { startBtn.disabled = true; startBtn.textContent = 'Drawing… keep going'; }
  var ring = document.getElementById('t-ring');
  if (ring) ring.className = 'timer-ring running';
  killTimer();
  _timer = setInterval(function() {
    rem--;
    var n = document.getElementById('t-num'); if (n) n.textContent = rem;
    if (rem <= 0) {
      killTimer();
      S.d[key] = true; save();
      var r = document.getElementById('t-ring'); if (r) r.className = 'timer-ring done';
      var h = document.getElementById('t-hint'); if (h) h.textContent = '✓ Draw complete!';
      var b = document.getElementById('t-start'); if (b) { b.className = 'btn btn-green btn-full'; b.textContent = '✓ Draw Complete'; b.disabled = true; }
    }
  }, 1000);
}

function scrKoDraw() {
  var done = !!S.d.ko_draw_done;
  return `
    <span class="mode-badge badge-ko">KO Mode</span>
    <div class="screen-title">15-Second KO Draw</div>
    <div class="screen-sub">Go as long as you can. Stop whenever you need to.</div>
    <div class="timer-wrap">
      <div class="timer-label ${done?'phase-early':''}" id="ko-phase" style="height:20px">${done?'Complete':''}</div>
      <div class="timer-ring" id="ko-ring"><span id="ko-num">15</span></div>
      <div class="timer-hint" id="ko-hint">${done?'':'Stop when you need to — it is OK'}</div>
    </div>
    ${!done ? `
      <button class="btn btn-red btn-full" id="ko-start" style="margin-bottom:10px" onclick="startKoDraw()">▶ Start KO Draw</button>
      <button class="btn btn-back btn-full" id="ko-stop" style="display:none" onclick="stopKoDraw()">■ I Stopped Early</button>
    ` : ''}
    ${done ? `
      <button class="btn btn-green btn-full" disabled style="margin-bottom:16px">✓ KO Draw Complete</button>
      <div class="field-wrap">
        <label class="field-label">About how many seconds did you actually draw?</label>
        <input class="text-in" type="number" min="1" max="15" style="font-size:20px;font-weight:700;text-align:center" placeholder="e.g. 11" value="${S.d.ko_seconds||''}" oninput="S.d.ko_seconds=parseInt(this.value)||0;save()">
      <p style="font-size:12px;color:var(--muted);text-align:center;margin-top:5px">Your best estimate is fine</p>
      </div>
      ${S.d.ko_seconds < 15 ? `
      <div class="field-wrap" style="margin-top:4px">
        <label class="field-label">Why did you stop early?</label>
        ${pg('ko_stop_reason','ko_stop_reason',['Too hot','Too harsh','Felt like enough','Ran out of breath','Device cut off','Other'])}
        <textarea style="margin-top:10px" placeholder="Any other details…" oninput="S.d.ko_stop_notes=this.value;save()">${S.d.ko_stop_notes||''}</textarea>
      </div>` : ''}
    ` : ''}
  `;
}

var _koElapsed = 0;
function startKoDraw() {
  _koElapsed = 0;
  var startBtn = document.getElementById('ko-start');
  var stopBtn  = document.getElementById('ko-stop');
  if (startBtn) startBtn.style.display = 'none';
  if (stopBtn)  stopBtn.style.display = 'block';
  var ring = document.getElementById('ko-ring'); if (ring) ring.className = 'timer-ring running';
  killTimer();
  _timer = setInterval(function() {
    _koElapsed++;
    var rem = 15 - _koElapsed;
    var n = document.getElementById('ko-num'); if (n) n.textContent = rem;
    var p = document.getElementById('ko-phase');
    if (p) {
      if (_koElapsed <= 5)       { p.textContent = 'EARLY'; p.className = 'timer-label phase-early'; }
      else if (_koElapsed <= 10) { p.textContent = 'MID';   p.className = 'timer-label phase-mid'; }
      else                       { p.textContent = 'LATE';  p.className = 'timer-label phase-late'; }
    }
    if (_koElapsed >= 15) { killTimer(); finishKo(15); }
  }, 1000);
}

function stopKoDraw() { killTimer(); finishKo(_koElapsed); }

function finishKo(actual) {
  S.d.ko_draw_done = true;
  S.d.ko_seconds = actual;
  save(); render();
}

function scrScore(mode) {
  var p = mode.toLowerCase();
  var badge = mode==='LV1'?'badge-lv1':mode==='LV2'?'badge-lv2':'badge-ko';
  var drawWord = S.day === 1 ? 'Sips' : 'Draw';
  if (mode === 'KO') drawWord = 'Draw';
  return `
    <span class="mode-badge ${badge}">${mode} Mode</span>
    <div class="screen-title">Rate Your ${mode} ${drawWord}</div>
    <div class="screen-sub">How were those hits?</div>
    <div class="card">
      <div class="card-title">Cloud Size</div>
      ${pg(p+'_cloud', p+'_cloud', OPT.cloud)}
    </div>
    <div class="card">
      <div class="card-title">Pull Feel — Airflow</div>
      ${pg(p+'_pull', p+'_pull', OPT.pull)}
    </div>
    <div class="card">
      <div class="card-title">Flavor</div>
      ${pg(p+'_flavor', p+'_flavor', OPT.flavor)}
    </div>
    <div class="card">
      <div class="card-title">Overall</div>
      ${pg(p+'_overall', p+'_overall', OPT.overall)}
    </div>
    <div class="field-wrap">
      <label class="field-label">What did you taste? (optional)</label>
      <textarea placeholder="Describe flavor, any off-notes, anything that stood out…" oninput="S.d['${p}_notes']=this.value;save()">${S.d[p+'_notes']||''}</textarea>
    </div>
  `;
}

function scrWait(mode) {
  var key = mode.toLowerCase() + '_wait_ready';
  var ready = !!S.d[key];
  return `
    <div class="screen-title">Wait a Few Minutes</div>
    <div class="screen-sub">Let the effect settle before you check in.</div>
    <div class="card" style="text-align:center">
      <div style="font-size:48px;margin:8px 0 14px">⏱️</div>
      <p style="font-size:16px;color:var(--navy);line-height:1.7">Set the device down and wait <strong>3–5 minutes</strong> before tapping I'm Ready.</p>
    </div>
    <div class="infobox infobox-blue">
      <strong>While you wait</strong>
      <ul style="padding-left:16px;margin-top:4px">
        <li>Drink some water</li>
        <li>Breathe fresh air if possible</li>
        <li>Notice how you're feeling</li>
      </ul>
    </div>
    <button class="btn ${ready?'btn-green':'btn-primary'} btn-full" style="margin-top:8px" onclick="markReady('${key}')">
      ${ready ? "✓ I'm Ready" : "I'm Ready"}
    </button>
  `;
}

function markReady(key) {
  S.d[key] = true; save();
  var btn = event.target;
  btn.className = 'btn btn-green btn-full';
  btn.textContent = "✓ I'm Ready";
}

function scrEffect(mode, includeV1) {
  var p = mode.toLowerCase();
  var badge = mode==='LV1'?'badge-lv1':mode==='LV2'?'badge-lv2':'badge-ko';
  return `
    <span class="mode-badge ${badge}">${mode} Mode</span>
    <div class="screen-title">How Do You Feel?</div>
    <div class="screen-sub">A few minutes have passed — check in with yourself.</div>
    <div class="card">
      <div class="card-title">Did you feel the effect?</div>
      ${pg(p+'_eff', p+'_eff', OPT.effect)}
    </div>
    ${includeV1 ? `
    <div class="card">
      <div class="card-title">Compared to a Jefe Plus V1 hit — how high are you?</div>
      ${pg(p+'_eff_v1', p+'_eff_v1', OPT.v1effect)}
    </div>
    ` : ''}
    <div class="field-wrap">
      <label class="field-label">Anything else about how you feel? (optional)</label>
      <textarea placeholder="e.g. heady, body, quick onset, lasted a while, smooth landing…" oninput="S.d['${p}_eff_notes']=this.value;save()">${S.d[p+'_eff_notes']||''}</textarea>
    </div>
  `;
}

function scrV1Compare() {
  return `
    <div class="screen-title">Jefe Plus V1 Comparison</div>
    <div class="screen-sub">Based on everything today — how does V2 stack up?</div>
    <div class="card">
      <div class="card-title">Overall Device Experience vs V1</div>
      ${pg('v1_overall', 'v1_overall', OPT.v1comp)}
    </div>
    <div class="card">
      <div class="card-title">Vapor Quality vs V1</div>
      ${pg('v1_vapor', 'v1_vapor', OPT.v1comp)}
    </div>
    <div class="card">
      <div class="card-title">Flavor vs V1</div>
      ${pg('v1_flavor', 'v1_flav', OPT.v1comp)}
    </div>
    <div class="field-wrap">
      <label class="field-label">What's the biggest difference from V1? (optional)</label>
      <textarea placeholder="What stands out most compared to the original Jefe Plus?" oninput="S.d.v1_notes=this.value;save()">${S.d.v1_notes||''}</textarea>
    </div>
  `;
}

function scrFeedback() {
  var defects = S.d.defects || [];
  return `
    <div class="screen-title">Final Feedback</div>
    <div class="screen-sub">Last few questions — almost done!</div>
    <div class="card">
      <div class="card-title">Any issues? Tap all that apply</div>
      <div class="defect-grid" id="defect-grid">
        ${DEFECTS.map(function(def){
          return '<div class="defect-chip ' + (defects.indexOf(def)>=0?'on':'') + '" onclick="toggleDefect(\''+def.replace(/'/g,"\\'")+'\')">' + def + '</div>';
        }).join('')}
      </div>
      <div style="margin-top:10px">
        <textarea placeholder="Any other issues not listed…" style="min-height:60px" oninput="S.d.defects_other=this.value;save()">${S.d.defects_other||''}</textarea>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Would you buy this device?</div>
      ${pg('purchase', 'purchase_intent', OPT.purchase)}
    </div>
    <div class="card">
      <div class="card-title">Jefe Plus V2 vs V1 — Overall</div>
      ${pg('v1_final', 'v1_final', OPT.v1comp)}
    </div>
    <div class="field-wrap">
      <label class="field-label">What one thing would you change?</label>
      <textarea placeholder="If you could change one thing about this device…" oninput="S.d.what_change=this.value;save()">${S.d.what_change||''}</textarea>
    </div>
    <div class="field-wrap">
      <label class="field-label">Any other comments?</label>
      <textarea placeholder="Anything else you want us to know…" oninput="S.d.other_comments=this.value;save()">${S.d.other_comments||''}</textarea>
    </div>
  `;
}

function toggleDefect(def) {
  if (!S.d.defects) S.d.defects = [];
  var idx = S.d.defects.indexOf(def);
  if (idx >= 0) S.d.defects.splice(idx, 1);
  else S.d.defects.push(def);
  save();
  var grid = document.getElementById('defect-grid');
  if (grid) {
    var defs = S.d.defects;
    grid.innerHTML = DEFECTS.map(function(d){
      return '<div class="defect-chip ' + (defs.indexOf(d)>=0?'on':'') + '" onclick="toggleDefect(\''+d.replace(/'/g,"\\'")+'\')">' + d + '</div>';
    }).join('');
  }
}

function scrDone() {
  var day = S.day;
  return `
    <div style="text-align:center;padding:20px 0 10px">
      <div class="done-check">✓</div>
      <div class="screen-title">Day ${day} Complete!</div>
      <div style="font-size:14px;color:var(--muted);margin-top:4px">${esc(S.code)} · ${S.oil||''}</div>
    </div>
    <div id="submit-status" class="infobox infobox-blue" style="margin-top:16px">
      <p>Sending data…</p>
    </div>
    ${day===1?`<div class="infobox infobox-gold" style="margin-top:8px">
      <strong>🔥 Tonight's Assignment</strong>
      <p>Use the device <strong>normally tonight</strong> — hit it however you like, including trying KO Mode. Come back tomorrow at around 50% oil or less.</p>
    </div>`:''}
    ${day===2?`<div class="infobox infobox-gold" style="margin-top:8px">
      <strong>🔥 Keep Going</strong>
      <p>Keep using the device normally. Come back for Day 3 when it's getting low — near empty is ideal.</p>
    </div>`:''}
    ${day===3?`<div class="infobox infobox-green" style="margin-top:8px">
      <strong>🙏 You Are Done — Thank You!</strong>
      <p>Your feedback means a lot. We really appreciate your time.</p>
    </div>`:''}
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:20px">
      ${day<3?'<button class="btn btn-primary btn-full" onclick="nextDay('+(day+1)+')">Start Day '+(day+1)+' →</button>':''}
      <button class="btn btn-back btn-full" onclick="exportCSV()">📥 Export Backup CSV</button>
    </div>
  `;
}

function nextDay(d) {
  var n = S.name, e = S.evalId, oil = S.oil;
  resetS();
  S.name = n; S.evalId = e; S.oil = oil;
  S.day = d; S.idx = 0;
  save(); render();
}

// ─── DATA SUBMIT ─────────────────────────────────────────────────────────────
function submitData() {
  var row = buildRow();
  var backs = JSON.parse(localStorage.getItem('gl_backs') || '[]');
  backs.push(row);
  localStorage.setItem('gl_backs', JSON.stringify(backs));

  fetch(SHEETS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ row: row })
  }).then(function() {
    var el = document.getElementById('submit-status');
    if (el) el.innerHTML = '<p style="color:var(--green);font-weight:600">✓ Data sent automatically</p>';
  }).catch(function() {
    var el = document.getElementById('submit-status');
    if (el) el.innerHTML = '<p style="color:var(--red);font-weight:600">⚠ Send failed — backup saved. Use Export CSV.</p>';
  });
}

function buildRow() {
  var row = { timestamp: new Date().toISOString(), name: S.name, deviceCode: S.code, oilLine: S.oil, day: S.day };
  Object.keys(S.d).forEach(function(k) {
    var v = S.d[k];
    row[k] = Array.isArray(v) ? v.join(';') : v;
  });
  return row;
}

function exportCSV() {
  var backs = JSON.parse(localStorage.getItem('gl_backs') || '[]');
  if (!backs.length) { toast('No data saved yet'); return; }
  var keys = [];
  backs.forEach(function(r){ Object.keys(r).forEach(function(k){ if(keys.indexOf(k)<0) keys.push(k); }); });
  var csv = keys.join(',') + '\n' + backs.map(function(r){
    return keys.map(function(k){
      var v = r[k] !== undefined ? String(r[k]) : '';
      return v.indexOf(',') >= 0 || v.indexOf('"') >= 0 ? '"'+v.replace(/"/g,'""')+'"' : v;
    }).join(',');
  }).join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url;
  a.download = 'golden_lungs_day' + S.day + '_' + (S.code||'export') + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ─── SAVE / LOAD ─────────────────────────────────────────────────────────────
function save() { localStorage.setItem('gl_s', JSON.stringify(S)); }

function resetS() {
  S.day = null; S.idx = 0;
  S.name = ''; S.evalId = ''; S.code = ''; S.oil = null;
  S.d = {};
}

function clearAndSplash() {
  localStorage.removeItem('gl_s');
  resetS();
  document.getElementById('resume-bar').style.display = 'none';
  splash();
}

function resumeSession() {
  document.getElementById('resume-bar').style.display = 'none';
  render();
}

// ─── SPLASH ──────────────────────────────────────────────────────────────────
function splash() {
  document.getElementById('prog-bar').style.width = '0%';
  document.getElementById('ctx-bar').textContent = '';
  document.getElementById('bottom-nav').innerHTML = '';
  document.getElementById('content').innerHTML = `
    <div style="text-align:center;padding:36px 0 20px">
      <div style="font-size:60px;margin-bottom:14px">🫁</div>
      <div style="font-size:26px;font-weight:700;color:var(--navy);letter-spacing:1px">GOLDEN LUNGS</div>
      <div style="font-size:13px;color:var(--muted);margin-top:6px">Jefe Plus V2 · Sensory Evaluation</div>
    </div>
    <div class="card">
      <div class="card-title">Select Session</div>
      <div class="day-btn-wrap">
        <button class="day-sel-btn" style="background:var(--navy)" onclick="startDay(1)">
          <div class="day-num">Day 1 — Sip Draws</div>
          <div class="day-desc">Warm up → LV1 + LV2 sips → use normally overnight</div>
        </button>
        <button class="day-sel-btn" style="background:var(--blue)" onclick="startDay(2)">
          <div class="day-num">Day 2 — Longer Draws</div>
          <div class="day-desc">7-second pulls on LV1 + LV2</div>
        </button>
        <button class="day-sel-btn" style="background:var(--red)" onclick="startDay(3)">
          <div class="day-num">Day 3 — KO Mode + Feedback</div>
          <div class="day-desc">15-second KO test + final questions</div>
        </button>
      </div>
    </div>
  `;
}

function startDay(d) {
  resetS(); S.day = d; S.idx = 0; save(); render();
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
(function init() {
  var saved = localStorage.getItem('gl_s');
  if (saved) {
    try {
      var parsed = JSON.parse(saved);
      if (parsed && parsed.day && parsed.idx > 0) {
        Object.assign(S, parsed);
        document.getElementById('resume-bar').style.display = 'flex';
      }
    } catch(e) {}
  }
  splash();
})();
</script>
</body>
